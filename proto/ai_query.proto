syntax = "proto3";

package agent_communication;

import "common.proto";

// ============================================================================
// AI Query Messages
// ============================================================================

// Agent偏好设置
message AgentPreference {
    repeated string preferred_skills = 1;  // 偏好技能
    repeated string preferred_agents = 2;  // 偏好Agent ID
    bool allow_fallback = 3;               // 允许回退到其他Agent
}

// 系统上下文: 平台注入的记忆和对话历史
message SystemContext {
    string user_id = 1;                    // 用户ID
    string user_memory = 2;                // Tier 2: 用户长期记忆 (格式化文本)
    string conversation_history = 3;       // Tier 1: 当前Agent对话历史
    string cross_agent_summary = 4;        // 跨Agent切换时的上下文摘要
}

// AI查询请求
message AIQueryRequest {
    string request_id = 1;           // 请求唯一ID
    string question = 2;             // 用户问题
    string context_id = 3;           // 上下文ID (用于多轮对话)
    int32 history_length = 4;        // 历史消息长度限制
    int32 timeout_seconds = 5;       // 超时时间
    map<string, string> metadata = 6; // 元数据
    AgentPreference preference = 7;   // Agent偏好设置
    string user_id = 8;              // 用户ID (登录后注入)
    SystemContext system_context = 9; // 平台注入的系统上下文 (记忆+历史)
}

// 产物
message Artifact {
    string name = 1;
    string mime_type = 2;
    bytes data = 3;
    map<string, string> metadata = 4;
}

// AI查询响应
message AIQueryResponse {
    string request_id = 1;           // 请求ID
    common.Status status = 2;        // 状态
    string answer = 3;               // AI回答
    string agent_id = 4;             // 处理的Agent ID
    string agent_name = 5;           // 处理的Agent名称
    string task_id = 6;              // A2A任务ID
    string context_id = 7;           // 上下文ID
    repeated Artifact artifacts = 8;  // 产物列表
    int64 processing_time_ms = 9;    // 处理时间
    map<string, string> memory_hints = 10; // Agent报告的用户记忆 (方式二: Agent上报, 平台存储)
}

// 流式事件
message AIStreamEvent {
    string event_id = 1;
    // event_type 取值:
    //   "partial"           — 流式内容片段 (content: 文本片段)
    //   "status"            — 状态变更 (content: 描述信息)
    //   "complete"          — 请求完成
    //   "error"             — 错误 (content: 错误信息)
    //   "plan"              — 多 Agent 执行计划 (content: ExecutionPlan JSON)
    //   "subtask_start"     — 子任务开始 (task_state: subtask_id)
    //   "subtask_complete"  — 子任务完成 (task_state: subtask_id, content: 结果摘要)
    string event_type = 2;
    string content = 3;
    string task_state = 4;
    string context_id = 5;
    int64 timestamp = 6;
}

// 查询状态请求
message QueryStatusRequest {
    string task_id = 1;
    string context_id = 2;
}

// Agent消息 (用于历史)
message AgentHistoryMessage {
    string message_id = 1;
    string role = 2;                 // "user", "agent", "system"
    string content = 3;
    int64 timestamp = 4;
}

// 查询状态响应
message QueryStatusResponse {
    common.Status status = 1;
    string task_state = 2;
    repeated AgentHistoryMessage history = 3;
}

// ============================================================================
// AI Query Service
// ============================================================================

// AI查询服务
service AIQueryService {
    // 同步查询
    rpc Query(AIQueryRequest) returns (AIQueryResponse);
    
    // 流式查询
    rpc QueryStream(AIQueryRequest) returns (stream AIStreamEvent);
    
    // 获取查询状态
    rpc GetQueryStatus(QueryStatusRequest) returns (QueryStatusResponse);
}
