# ============================================================================
# NexusAI Gateway — Docker Compose
# ============================================================================
# 启动: docker compose -f docker-compose.gateway.yaml up -d
# 停止: docker compose -f docker-compose.gateway.yaml down
# 日志: docker compose -f docker-compose.gateway.yaml logs -f
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # redis: 持久化存储 (认证 Token + 用户数据 + 对话记忆)
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nexusai-redis
    command: redis-server --port 6379 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gateway-net
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # envoy: gRPC-Web ↔ gRPC 协议转换（替代 improbable/grpcwebproxy）
  # 浏览器 (gRPC-Web/HTTP1.1) → :8081 → gRPC/2 → NexusAI :50051
  # --------------------------------------------------------------------------
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    container_name: nexusai-envoy
    volumes:
      - ./gateway/envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gateway-net
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # nginx: 反向代理 + 限流 + 认证 + 负载均衡
  # :8080 gRPC-Web 入口（浏览器流量）
  # :8082 直连 gRPC 入口（后端服务间调用）
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: nexusai-nginx
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
      - "8082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gateway-net
    depends_on:
      - envoy
      - redis
    restart: unless-stopped

networks:
  gateway-net:
    driver: bridge

volumes:
  redis-data:
