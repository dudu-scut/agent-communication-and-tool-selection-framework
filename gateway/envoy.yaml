# ============================================================================
# Envoy Proxy — gRPC-Web ↔ gRPC 协议转换
# ============================================================================
# 替代 improbable/grpcwebproxy，使用 Envoy 原生 gRPC-Web 过滤器。
#
# 流量路径:
#   浏览器 (gRPC-Web/HTTP1.1) → Nginx :8080 → Envoy :8081 → gRPC/2 → NexusAI :50051
#
# 关键配置:
#   - envoy.filters.http.grpc_web: 自动完成 gRPC-Web ↔ gRPC 协议转换
#   - envoy.filters.http.cors: 处理浏览器跨域请求
#   - connect_timeout 2s: 后端不可达时快速失败
# ============================================================================

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: grpc_web_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8081
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: grpc_web_service
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: nexusai_grpc
                            timeout: 300s
                      cors:
                        allow_origin_string_match:
                          - safe_regex:
                              google_re2: {}
                              regex: ".*"
                        allow_methods: "POST, OPTIONS"
                        allow_headers: "content-type, x-grpc-web, x-api-key, authorization"
                        expose_headers: "grpc-status, grpc-message"
                http_filters:
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: nexusai_grpc
      connect_timeout: 2s
      type: STRICT_DNS
      load_assignment:
        cluster_name: nexusai_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: host.docker.internal
                      port_value: 50051
