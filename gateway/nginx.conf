# ============================================================================
# NexusAI API Gateway — Nginx Configuration
# ============================================================================
# P0-4: HTTP 反向代理
# P0-5: gRPC-Web 协议转换（经 Envoy）+ 直连 grpc_pass
# P0-6: 限流（limit_req）+ API Key 认证 + CORS
# P0-7: 流式响应（grpc_buffering off）
# P0-8: 负载均衡（least_conn + 被动健康检查）
# ============================================================================

events {
    worker_connections 1024;
}

http {
    # --------------------------------------------------------------------------
    # 限流区域
    # --------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # --------------------------------------------------------------------------
    # API Key 白名单
    # --------------------------------------------------------------------------
    map $http_x_api_key $api_key_valid {
        default               0;
        "nexusai-dev-key-01"  1;
        "nexusai-dev-key-02"  1;
        "nexusai-prod-key-01" 1;
    }

    # --------------------------------------------------------------------------
    # gRPC 上游集群（P0-8 负载均衡）
    # --------------------------------------------------------------------------
    upstream nexusai_backend {
        least_conn;
        server host.docker.internal:50051 max_fails=3 fail_timeout=30s;
        # 多实例扩展：
        # server nexusai-2:50051 max_fails=3 fail_timeout=30s;
        # server nexusai-3:50051 backup;
    }

    upstream envoy_backend {
        server envoy:8081;
    }

    # --------------------------------------------------------------------------
    # 访问日志格式（gRPC 友好）
    # --------------------------------------------------------------------------
    log_format grpc_log '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_x_api_key" "$http_user_agent" '
                        'grpc_status=$upstream_header_trailer_grpc_status';

    # ==========================================================================
    # Server: :8080 — gRPC-Web 入口（浏览器）
    # ==========================================================================
    server {
        listen 8080 http2;
        server_name localhost;

        access_log /var/log/nginx/grpc_web_access.log grpc_log;

        # --- CORS 头（gRPC-Web 必需） ---
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "content-type, x-grpc-web, x-api-key, authorization" always;
        add_header Access-Control-Expose-Headers "grpc-status, grpc-message" always;

        # --- 流量管控 ---
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 100;
        limit_req_status 429;
        limit_conn_status 429;

        # --- OPTIONS 预检直接返回 ---
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "content-type, x-grpc-web, x-api-key, authorization" always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            # --- API Key 校验 ---
            if ($api_key_valid = 0) {
                return 403;
            }

            # --- gRPC-Web 透传到 Envoy（保持 HTTP/1.1，由它做协议转换） ---
            proxy_pass http://envoy_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # P0-7: 流式响应不缓冲
            proxy_buffering off;
        }

        # --- 健康检查端点（不限流不鉴权） ---
        location /health {
            grpc_pass grpc://nexusai_backend;
            grpc_read_timeout 10s;
        }
    }

    # ==========================================================================
    # Server: :8082 — 直连 gRPC 入口（后端服务间调用）
    # ==========================================================================
    server {
        listen 8082 http2;
        server_name localhost;

        access_log /var/log/nginx/grpc_direct_access.log grpc_log;

        # --- API Key 校验 ---
        if ($api_key_valid = 0) {
            return 403;
        }

        # --- 限流 ---
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 100;
        limit_req_status 429;

        location / {
            grpc_pass grpc://nexusai_backend;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            grpc_read_timeout 300s;
            grpc_send_timeout 300s;
            grpc_buffering off;
        }

        location /health {
            grpc_pass grpc://nexusai_backend;
            grpc_read_timeout 10s;
        }
    }
}
